<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextureGen | Minimal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg-base: #0a0a0a;
            --bg-panel: #111111;
            --bg-surface: #1a1a1a;
            --bg-hover: #222222;
            --border-subtle: #2a2a2a;
            --text-primary: #ededed;
            --text-secondary: #888888;
            --accent: #ffffff;
            --accent-ai: #a78bfa; /* Violeta suave minimalista */
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Scrollbar Invisible / Minimalista */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Componentes UI Minimalistas */
        .glass-panel {
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
        }

        /* Sliders Rediseñados */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            height: 12px;
            outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            cursor: pointer;
            background: #333;
            border-radius: 1px;
            transition: background 0.2s ease;
        }
        input[type=range]:hover::-webkit-slider-runnable-track {
            background: #444;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -5px;
            box-shadow: 0 0 0 2px var(--bg-panel);
            transition: transform 0.1s ease;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

        /* Color Picker Minimalista */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            cursor: pointer;
            padding: 0;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border-subtle); border-radius: 4px; }

        /* Toggle Checkbox Minimalista */
        .toggle-checkbox:checked { right: 0; border-color: var(--accent); }
        .toggle-checkbox:checked + .toggle-label { background-color: var(--accent); }
        .toggle-checkbox:checked + .toggle-label:after { transform: translateX(100%); border-color: white; }

        /* Estructuras Generales */
        .border-layout { border-color: var(--border-subtle); }
        
        .layer-item { transition: all 0.2s ease; }
        .layer-item.active { background-color: var(--bg-surface); }
        .layer-item:not(.active):hover { background-color: rgba(255,255,255,0.02); }

        #workspace {
            background-color: var(--bg-base);
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 24px 24px;
            cursor: grab;
            position: relative;
        }
        #workspace:active { cursor: grabbing; }

        .btn-ghost {
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        .btn-ghost:hover {
            color: var(--text-primary);
            background: var(--bg-surface);
        }

        /* Menús flotantes suaves */
        .dropdown-menu {
            transform-origin: top center;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .dropdown-hidden { transform: translateY(-5px) scale(0.98); opacity: 0; pointer-events: none; }
        .dropdown-visible { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }

        .font-mono-xs { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
        .label-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); }
    </style>
</head>
<body class="h-screen flex flex-col">

                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>

                    <button onclick="app.aiGenerate('caja_rota')" class="w-full text-left px-3 py-1.5 text-xs text-gray-300 hover:text-white hover:bg-white/5 transition-colors">Cartón Desgastado</button>

    <div class="flex-grow flex overflow-hidden">
        
        <!-- Panel Izquierdo: Capas -->
        <aside class="w-64 bg-[#111] border-r border-layout flex flex-col shrink-0 z-20">
            <!-- Añadir Capa -->
            <div class="p-4 relative">

                </div>
            </div>
            
            <div class="px-4 pb-2 flex justify-between items-center">

            <!-- Lista de Capas -->

                <!-- Capas JS -->

        <!-- Canvas Central -->

    <!-- Canvas Ocultos -->
    <canvas id="renderCanvas" class="hidden"></canvas>
    <canvas id="tempCanvas" class="hidden"></canvas>

<script>
/**
 * TextureGen - Core Engine (Minimal Edition)
 */

const Utils = {
    generateId: () => Math.random().toString(36).substr(2, 9),
    hexToRgb: (hex) => {
        let r = 0, g = 0, b = 0;
        if (hex.length === 4) {
            r = parseInt(hex[1] + hex[1], 16); g = parseInt(hex[2] + hex[2], 16); b = parseInt(hex[3] + hex[3], 16);
        } else if (hex.length === 7) {
            r = parseInt(hex.substring(1, 3), 16); g = parseInt(hex.substring(3, 5), 16); b = parseInt(hex.substring(5, 7), 16);
        }
        return {r, g, b};
    },
    debounce: (func, wait) => {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func(...args), wait);
        };
    }
};

// UI Menus
function toggleMenu(id) {
    const menus = ['addLayerMenu', 'aiMenu'];
    menus.forEach(m => {
        const el = document.getElementById(m);
        if (m === id) {
            el.classList.toggle('dropdown-hidden');
            el.classList.toggle('dropdown-visible');
        } else {
            el.classList.add('dropdown-hidden');
            el.classList.remove('dropdown-visible');
        }
    });
}
document.addEventListener('click', (e) => {
    if (!e.target.closest('.group') && !e.target.closest('button[onclick*="addLayerMenu"]')) {
        document.getElementById('addLayerMenu').classList.add('dropdown-hidden');
        document.getElementById('addLayerMenu').classList.remove('dropdown-visible');
        document.getElementById('aiMenu').classList.add('dropdown-hidden');
        document.getElementById('aiMenu').classList.remove('dropdown-visible');
    }
});

// --- MOTOR PROCEDURAL ---
const Engine = {
    generateNoise(ctx, width, height, scale, opacity, blendMode = 'source-over', highFreq = false) {
        const sw = Math.ceil(width / scale);
        const sh = Math.ceil(height / scale);
        
        const offCanvas = document.createElement('canvas');
        offCanvas.width = sw; offCanvas.height = sh;
        const oCtx = offCanvas.getContext('2d', { willReadFrequently: true });
        const imgData = oCtx.createImageData(sw, sh);
        const data = imgData.data;
        
        for (let i = 0; i < data.length; i += 4) {
            const val = Math.floor(Math.random() * 255);
            data[i] = val; data[i+1] = val; data[i+2] = val;
            data[i+3] = Math.floor(255 * opacity);
        }
        oCtx.putImageData(imgData, 0, 0);
        
        ctx.globalCompositeOperation = blendMode;
        ctx.imageSmoothingEnabled = !highFreq;
        ctx.imageSmoothingQuality = highFreq ? 'low' : 'high';
        ctx.drawImage(offCanvas, 0, 0, sw, sh, 0, 0, width, height);
        ctx.globalCompositeOperation = 'source-over';
        ctx.imageSmoothingEnabled = true;
    },

    generateFilmGrain(ctx, width, height, density, contrast, monochrome, size) {
        let targetW = width; let targetH = height;
        if(size > 1) { targetW = Math.floor(width / size); targetH = Math.floor(height / size); }
        
        const offCanvas = document.createElement('canvas');
        offCanvas.width = targetW; offCanvas.height = targetH;
        const oCtx = offCanvas.getContext('2d', { willReadFrequently: true });
        
        const imgData = oCtx.createImageData(targetW, targetH);
        const data = imgData.data;
        const contrastFactor = (259 * (contrast * 255 + 255)) / (255 * (259 - contrast * 255));

        for (let i = 0; i < data.length; i += 4) {
            if (Math.random() > density) continue;
            let r = Math.random() * 255;
            let g = monochrome ? r : Math.random() * 255;
            let b = monochrome ? r : Math.random() * 255;

            r = contrastFactor * (r - 128) + 128;
            g = contrastFactor * (g - 128) + 128;
            b = contrastFactor * (b - 128) + 128;

            data[i] = r; data[i+1] = g; data[i+2] = b; data[i+3] = 255;
        }
        oCtx.putImageData(imgData, 0, 0);
        
        if (size > 1) {
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(offCanvas, 0, 0, targetW, targetH, 0, 0, width, height);
            ctx.imageSmoothingEnabled = true;
        } else {
            ctx.drawImage(offCanvas, 0, 0);
        }
    },

    applyGlitchBlockShift(ctx, width, height, intensity) {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = width; tempCanvas.height = height;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(ctx.canvas, 0, 0);

        const blocks = Math.floor(intensity * 20) + 2;
        for(let i=0; i<blocks; i++) {
            const bh = Math.random() * (height * 0.1) + 5;
            const by = Math.random() * height;
            const shiftX = (Math.random() - 0.5) * (width * intensity * 0.5);
            ctx.drawImage(tempCanvas, 0, by, width, bh, shiftX, by, width, bh);
        }
    }
};

// --- DEFINICIONES DE CAPAS ---
const LayerDefinitions = {
    papel: {
        name: 'Papel',
        defaultParams: { colorBase: '#f4ebd8', rugosidad: 0.4, fibras: 0.3, arrugas: 0.2, envejecimiento: 0.1, iaMejora: true },
        render: (ctx, w, h, p) => {
            ctx.fillStyle = p.colorBase; ctx.fillRect(0, 0, w, h);
            if (p.rugosidad > 0) {
                Engine.generateNoise(ctx, w, h, 64, p.rugosidad * 0.5, 'multiply');
                Engine.generateNoise(ctx, w, h, 16, p.rugosidad * 0.3, 'screen', p.iaMejora);
            }
            if (p.arrugas > 0) {
                ctx.globalAlpha = p.arrugas * 0.4; ctx.globalCompositeOperation = 'multiply';
                for(let i=0; i<3; i++) {
                    ctx.beginPath(); ctx.moveTo(Math.random()*w, 0);
                    ctx.bezierCurveTo(Math.random()*w, h/3, Math.random()*w, h*(2/3), Math.random()*w, h);
                    ctx.lineWidth = Math.random() * 20 + 5; ctx.strokeStyle = `rgba(0,0,0,${Math.random()*0.1})`; ctx.stroke();
                }
                ctx.globalAlpha = 1;
            }
            if (p.fibras > 0) {
                ctx.globalCompositeOperation = 'multiply'; ctx.lineWidth = 1;
                const rgb = Utils.hexToRgb(p.colorBase); ctx.strokeStyle = `rgba(${rgb.r*0.4}, ${rgb.g*0.4}, ${rgb.b*0.4}, 0.2)`;
                const numFibers = Math.floor((w * h) * 0.0003 * p.fibras);
                for(let i=0; i<numFibers; i++) {
                    ctx.beginPath(); const x = Math.random() * w; const y = Math.random() * h;
                    const len = 4 + Math.random() * 15; const angle = Math.random() * Math.PI * 2;
                    ctx.moveTo(x, y); ctx.quadraticCurveTo(x + Math.cos(angle)*len/2 + (Math.random()*4-2), y + Math.sin(angle)*len/2, x + Math.cos(angle)*len, y + Math.sin(angle)*len);
                    ctx.stroke();
                }
            }
            if(p.envejecimiento > 0) {
                ctx.globalCompositeOperation = 'multiply';
                const grad = ctx.createRadialGradient(w/2, h/2, w*0.2, w/2, h/2, Math.max(w,h)*0.8);
                grad.addColorStop(0, 'rgba(255, 255, 255, 0)'); grad.addColorStop(0.7, `rgba(139, 115, 85, ${p.envejecimiento * 0.5})`); grad.addColorStop(1, `rgba(60, 40, 20, ${p.envejecimiento})`);
                ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);
            }
            ctx.globalCompositeOperation = 'source-over';
        },
        ui: [
            { id: 'colorBase', label: 'Color Base', type: 'color' },
            { id: 'rugosidad', label: 'Rugosidad', type: 'slider', min: 0, max: 1, step: 0.05 },
            { id: 'fibras', label: 'Densidad Fibras', type: 'slider', min: 0, max: 1, step: 0.05 },
            { id: 'arrugas', label: 'Arrugas', type: 'slider', min: 0, max: 1, step: 0.05 },
            { id: 'envejecimiento', label: 'Desgaste Borde', type: 'slider', min: 0, max: 1, step: 0.05 },
            { id: 'iaMejora', label: 'Micro-detalle IA', type: 'checkbox' }
        ]
    },
    carton: {
        name: 'Cartón',
        defaultParams: { colorKraft: '#c19a6b', corrugado: 0.6, manchas: 0.4, desgaste: 0.3 },
        render: (ctx, w, h, p) => {
            ctx.fillStyle = p.colorKraft; ctx.fillRect(0, 0, w, h);
            Engine.generateNoise(ctx, w, h, 8, 0.15, 'multiply', true);
            if (p.corrugado > 0) {
                ctx.globalCompositeOperation = 'multiply'; ctx.globalAlpha = p.corrugado * 0.3;
                for(let x=0; x<w; x+=15) { ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.3 + 0.1})`; ctx.fillRect(x, 0, 3, h); }
                ctx.globalAlpha = 1;
            }
            if (p.manchas > 0) {
                const numDots = Math.floor((w * h) * 0.0005 * p.manchas); ctx.globalCompositeOperation = 'multiply';
                for(let i=0; i<numDots; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.3)';
                    ctx.beginPath(); ctx.arc(Math.random()*w, Math.random()*h, Math.random()*1.5, 0, Math.PI*2); ctx.fill();
                }
            }
            if (p.desgaste > 0) Engine.generateNoise(ctx, w, h, 128, p.desgaste * 0.6, 'multiply');
            ctx.globalCompositeOperation = 'source-over';
        },
        ui: [
            { id: 'colorKraft', label: 'Color Kraft', type: 'color' },
            { id: 'corrugado', label: 'Ondulación', type: 'slider', min: 0, max: 1, step: 0.05 },
            { id: 'manchas', label: 'Impurezas', type: 'slider', min: 0, max: 1, step: 0.05 },
            { id: 'desgaste', label: 'Desgaste', type: 'slider', min: 0, max: 1, step: 0.05 }
        ]
    },
    grano: {
        name: 'Grano',
        defaultParams: { tamano: 1.5, densidad: 0.7, contraste: 0.2, monocromo: true },
        render: (ctx, w, h, p) => { Engine.generateFilmGrain(ctx, w, h, p.densidad, p.contraste, p.monocromo, p.tamano); },
        ui: [
            { id: 'tamano', label: 'Escala', type: 'slider', min: 1, max: 6, step: 0.1 },
            { id: 'densidad', label: 'Densidad', type: 'slider', min: 0.1, max: 1, step: 0.05 },
            { id: 'contraste', label: 'Contraste', type: 'slider', min: 0, max: 1, step: 0.05 },
            { id: 'monocromo', label: 'Monocromo', type: 'checkbox' }
        ]
    },
    analogicas: {
        name: 'Fugas y Polvo',
        defaultParams: { polvo: 0.5, aranazos: 0.4, fugasLuz: 0.3, colorFuga: '#ff5500' },
        render: (ctx, w, h, p) => {
            if(p.polvo > 0) {
                const numPolvo = Math.floor((w * h) * 0.0001 * p.polvo); ctx.fillStyle = '#111'; ctx.strokeStyle = '#111';
                for(let i=0; i<numPolvo; i++) {
                    ctx.globalAlpha = Math.random() * 0.7 + 0.3;
                    if (Math.random() > 0.7) {
                        ctx.lineWidth = Math.random() + 0.5; ctx.beginPath();
                        let px = Math.random()*w; let py = Math.random()*h; ctx.moveTo(px, py);
                        for(let s=0; s<3; s++) { px += (Math.random()-0.5)*15; py += (Math.random()-0.5)*15; ctx.lineTo(px, py); }
                        ctx.stroke();
                    } else {
                        ctx.beginPath(); ctx.arc(Math.random()*w, Math.random()*h, Math.random()*1.5, 0, Math.PI*2); ctx.fill();
                    }
                }
            }
            if(p.aranazos > 0) {
                const numScratch = Math.floor(w * 0.02 * p.aranazos); ctx.strokeStyle = '#fff';
                for(let i=0; i<numScratch; i++) {
                    ctx.globalAlpha = Math.random() * 0.5 + 0.1; ctx.lineWidth = Math.random() * 2;
                    const x = Math.random() * w; ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + (Math.random()*4-2), h); ctx.stroke();
                }
            }
            if(p.fugasLuz > 0) {
                ctx.globalCompositeOperation = 'screen'; ctx.globalAlpha = p.fugasLuz;
                const x = Math.random() > 0.5 ? 0 : w; const y = Math.random() * h;
                const grad = ctx.createRadialGradient(x, y, 0, x, y, Math.max(w,h)*0.6);
                const rgb = Utils.hexToRgb(p.colorFuga);
                grad.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.8)`); grad.addColorStop(0.5, `rgba(${rgb.r}, 50, 50, 0.3)`); grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);
            }
            ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
        },
        ui: [
            { id: 'polvo', label: 'Polvo/Pelusas', type: 'slider', min: 0, max: 1, step: 0.05 },
            { id: 'aranazos', label: 'Arañazos', type: 'slider', min: 0, max: 1, step: 0.05 },
            { id: 'fugasLuz', label: 'Fuga de luz', type: 'slider', min: 0, max: 1, step: 0.05 },
            { id: 'colorFuga', label: 'Color Fuga', type: 'color' }
        ]
    },
    glitch: {
        name: 'Glitch VHS',
        defaultParams: { desplazamiento: 0.5, aberracion: 0.4, scanlines: 0.6, ruidoDigital: 0.3 },
        render: (ctx, w, h, p) => {
            if (p.scanlines > 0) {
                ctx.globalCompositeOperation = 'overlay'; ctx.fillStyle = `rgba(0,0,0,${p.scanlines * 0.5})`;
                for(let y=0; y<h; y+=4) { ctx.fillRect(0, y, w, 2); }
                ctx.globalCompositeOperation = 'source-over';
            }
            if (p.ruidoDigital > 0) Engine.generateNoise(ctx, w, h, 2, p.ruidoDigital * 0.3, 'screen', true);
        },
        ui: [
            { id: 'desplazamiento', label: 'Desplazamiento', type: 'slider', min: 0, max: 1, step: 0.05 },
            { id: 'aberracion', label: 'Aberración RGB', type: 'slider', min: 0, max: 1, step: 0.05 },
            { id: 'scanlines', label: 'Scanlines', type: 'slider', min: 0, max: 1, step: 0.05 },
            { id: 'ruidoDigital', label: 'Ruido VHS', type: 'slider', min: 0, max: 1, step: 0.05 }
        ]
    }
};

// --- APLICACIÓN ---
const app = {
    layers: [],
    selectedLayerId: null,
    zoom: 1, panX: 0, panY: 0, isDragging: false, startX: 0, startY: 0,
    previewRes: 800,

    init() {
        this.previewCanvas = document.getElementById('previewCanvas');
        this.previewCtx = this.previewCanvas.getContext('2d', { willReadFrequently: true });
        this.tempCanvas = document.getElementById('tempCanvas');
        this.tempCtx = this.tempCanvas.getContext('2d', { willReadFrequently: true });

        this.setupViewportControls();
        this.aiGenerate('vintage_1800'); // Empezar con algo visual
        
        this.debouncedRender = Utils.debounce(() => this.renderPreview(), 50);
        window.addEventListener('resize', Utils.debounce(() => this.centerCanvas(), 100));
    },

    setupViewportControls() {
        const workspace = document.getElementById('workspace');
        workspace.addEventListener('mousedown', (e) => {
            if (e.target !== this.previewCanvas && e.target !== workspace) return;
            this.isDragging = true; this.startX = e.clientX - this.panX; this.startY = e.clientY - this.panY;
        });
        window.addEventListener('mousemove', (e) => {
            if (!this.isDragging) return;
            this.panX = e.clientX - this.startX; this.panY = e.clientY - this.startY; this.updateTransform();
        });
        window.addEventListener('mouseup', () => { this.isDragging = false; });
        workspace.addEventListener('wheel', (e) => {
            e.preventDefault(); this.setZoom(this.zoom + (e.deltaY > 0 ? -0.1 : 0.1));
        }, { passive: false });
    },

    setZoom(newZoom) {
        this.zoom = Math.max(0.25, Math.min(newZoom, 5));
        document.getElementById('zoomLevel').innerText = Math.round(this.zoom * 100) + '%';
        this.updateTransform();
    },

    resetView() { this.zoom = 1; this.panX = 0; this.panY = 0; document.getElementById('zoomLevel').innerText = '100%'; this.updateTransform(); },
    centerCanvas() { this.resetView(); },
    updateTransform() { this.previewCanvas.style.transform = `translate(${this.panX}px, ${this.panY}px) scale(${this.zoom})`; },

    addLayer(type, presetParams = null, blendMode = 'normal', opacity = 1) {
        const def = LayerDefinitions[type];
        if(!def) return;
        const layer = { id: Utils.generateId(), type: type, name: def.name, visible: true, opacity: opacity, blendMode: blendMode, params: presetParams ? {...presetParams} : {...def.defaultParams} };
        this.layers.unshift(layer);
        this.selectLayer(layer.id);
        this.updateLayerUI(); this.renderPreview(); toggleMenu('');
    },

    deleteLayer(id) {
        this.layers = this.layers.filter(l => l.id !== id);
        if(this.selectedLayerId === id) this.selectedLayerId = this.layers.length > 0 ? this.layers[0].id : null;
        this.updateLayerUI(); this.buildPropertiesUI(); this.renderPreview();
    },

    toggleVisibility(id) {
        const layer = this.layers.find(l => l.id === id);
        if(layer) { layer.visible = !layer.visible; this.updateLayerUI(); this.renderPreview(); }
    },

    selectLayer(id) { this.selectedLayerId = id; this.updateLayerUI(); this.buildPropertiesUI(); },

    updateActiveLayer(key, value) {
        const layer = this.layers.find(l => l.id === this.selectedLayerId);
        if(!layer) return;
        if (key === 'opacity' || key === 'blendMode') {
            layer[key] = value;
            if(key === 'opacity') {
                const el = document.getElementById('layerOpacityVal');
                if(el) el.innerText = Math.round(value * 100) + '%';
            }
        } else { layer.params[key] = value; }
        this.debouncedRender();
    },

    moveLayer(index, dir) {
        if(index + dir < 0 || index + dir >= this.layers.length) return;
        const temp = this.layers[index]; this.layers[index] = this.layers[index + dir]; this.layers[index + dir] = temp;
        this.updateLayerUI(); this.renderPreview();
    },

    aiGenerate(intention) {
        this.layers = []; toggleMenu('');
        switch(intention) {
            case 'vintage_1800':
                this.addLayer('papel', { colorBase: '#e6d8c3', rugosidad: 0.6, fibras: 0.8, arrugas: 0.5, envejecimiento: 0.8, iaMejora: true }, 'normal', 1);
                this.addLayer('analogicas', { polvo: 0.5, aranazos: 0.2, fugasLuz: 0.2, colorFuga: '#8b5a2b' }, 'multiply', 0.6);
                this.addLayer('grano', { tamano: 1.5, densidad: 0.7, contraste: 0.3, monocromo: true }, 'overlay', 0.5);
                break;
            case 'cyber_glitch':
                this.addLayer('papel', { colorBase: '#0d0d12', rugosidad: 0.1, fibras: 0, arrugas: 0, envejecimiento: 0, iaMejora: false }, 'normal', 1);
                this.addLayer('glitch', { desplazamiento: 0.8, aberracion: 0.9, scanlines: 0.7, ruidoDigital: 0.5 }, 'screen', 1);
                this.addLayer('analogicas', { polvo: 0.2, aranazos: 0.8, fugasLuz: 0.4, colorFuga: '#00ffcc' }, 'screen', 0.4);
                break;
            case 'cine_noir':
                this.addLayer('papel', { colorBase: '#1a1a1a', rugosidad: 0.2, fibras: 0, arrugas: 0, envejecimiento: 0.7, iaMejora: true }, 'normal', 1);
                this.addLayer('analogicas', { polvo: 0.8, aranazos: 0.6, fugasLuz: 0.3, colorFuga: '#ffffff' }, 'screen', 0.4);
                this.addLayer('grano', { tamano: 2.2, densidad: 0.9, contraste: 0.5, monocromo: true }, 'overlay', 0.8);
                break;
            case 'caja_rota':
                this.addLayer('carton', { colorKraft: '#a37c52', corrugado: 0.8, manchas: 0.7, desgaste: 0.9 }, 'normal', 1);
                this.addLayer('papel', { colorBase: '#ffffff', rugosidad: 0, fibras: 0, arrugas: 0.8, envejecimiento: 0, iaMejora: false }, 'multiply', 0.4);
                break;
        }
        this.resetView();
    },

    updateLayerUI() {
        const list = document.getElementById('layer-list'); list.innerHTML = '';
        
        this.layers.forEach((layer, idx) => {
            const isSelected = layer.id === this.selectedLayerId;
            const div = document.createElement('div');
            div.className = `layer-item flex items-center px-2 py-2 rounded-md cursor-pointer group ${isSelected ? 'active' : ''}`;
            
            div.innerHTML = `
                <button class="mr-2 text-gray-500 hover:text-white transition-colors flex-shrink-0" onclick="event.stopPropagation(); app.toggleVisibility('${layer.id}')">
                    ${layer.visible ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>'}
                </button>
                <div class="flex-grow flex flex-col overflow-hidden" onclick="app.selectLayer('${layer.id}')">
                    <span class="text-xs font-medium text-gray-200 truncate">${layer.name}</span>
                    <span class="font-mono-xs text-gray-500 truncate">${layer.blendMode} / ${Math.round(layer.opacity*100)}%</span>
                </div>
                <div class="flex flex-col opacity-0 group-hover:opacity-100 transition-opacity ml-1">
                    <button class="text-gray-600 hover:text-white p-0.5" onclick="event.stopPropagation(); app.moveLayer(${idx}, -1)" ${idx===0?'disabled':''}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg></button>
                    <button class="text-gray-600 hover:text-white p-0.5" onclick="event.stopPropagation(); app.moveLayer(${idx}, 1)" ${idx===this.layers.length-1?'disabled':''}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg></button>
                </div>
                <button class="ml-1 p-1 text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all" onclick="event.stopPropagation(); app.deleteLayer('${layer.id}')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            `;
            list.appendChild(div);
        });
    },

    buildPropertiesUI() {
        const panel = document.getElementById('properties-panel'); panel.innerHTML = '';
        const layer = this.layers.find(l => l.id === this.selectedLayerId);
        if(!layer) { panel.innerHTML = '<div class="text-center text-xs text-gray-600 mt-12 px-6">Selecciona una capa.</div>'; return; }

        // Fusión y Opacidad Global de Capa
        const globalDiv = document.createElement('div');
        globalDiv.className = 'p-5 border-b border-layout bg-[#151515]';
        globalDiv.innerHTML = `
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <span class="text-xs text-gray-400">Fusión</span>
                    <select class="bg-[#222] border border-[#333] text-xs text-white rounded px-2 py-1 outline-none cursor-pointer" onchange="app.updateActiveLayer('blendMode', this.value)">
                        ${['normal','multiply','screen','overlay','darken','lighten','color-dodge','hard-light','soft-light','difference'].map(m => `<option value="${m}" ${layer.blendMode===m?'selected':''}>${m}</option>`).join('')}
                    </select>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1"><span class="text-xs text-gray-400">Opacidad</span><span class="font-mono-xs text-gray-500" id="layerOpacityVal">${Math.round(layer.opacity*100)}%</span></div>
                    <input type="range" min="0" max="1" step="0.01" value="${layer.opacity}" oninput="app.updateActiveLayer('opacity', parseFloat(this.value))">
                </div>
            </div>
        `;
        panel.appendChild(globalDiv);

        // Parámetros Específicos
        const paramsDiv = document.createElement('div');
        paramsDiv.className = 'p-5 space-y-6';
        
        LayerDefinitions[layer.type].ui.forEach(control => {
            const wrapper = document.createElement('div');
            const labelFlex = document.createElement('div'); labelFlex.className = 'flex justify-between items-center mb-2';
            const label = document.createElement('label'); label.className = 'text-xs text-gray-300 font-medium';
            
            if(control.id.includes('ia')) label.innerHTML = `<span class="text-[#a78bfa]">✦</span> ${control.label}`;
            else label.innerText = control.label;

            const valSpan = document.createElement('span'); valSpan.className = 'font-mono-xs text-gray-500';
            labelFlex.appendChild(label); if(control.type === 'slider') labelFlex.appendChild(valSpan);
            wrapper.appendChild(labelFlex);

            const value = layer.params[control.id];

            if (control.type === 'slider') {
                const input = document.createElement('input');
                input.type = 'range'; input.min = control.min; input.max = control.max; input.step = control.step; input.value = value;
                valSpan.innerText = value;
                input.addEventListener('input', (e) => { valSpan.innerText = e.target.value; this.updateActiveLayer(control.id, parseFloat(e.target.value)); });
                wrapper.appendChild(input);
            } else if (control.type === 'color') {
                const flex = document.createElement('div'); flex.className = 'flex items-center gap-3';
                const input = document.createElement('input'); input.type = 'color'; input.value = value;
                const hexLabel = document.createElement('span'); hexLabel.className = 'font-mono-xs text-gray-500 uppercase'; hexLabel.innerText = value;
                input.addEventListener('input', (e) => { hexLabel.innerText = e.target.value.toUpperCase(); this.updateActiveLayer(control.id, e.target.value); });
                flex.appendChild(input); flex.appendChild(hexLabel); wrapper.appendChild(flex);
            } else if (control.type === 'checkbox') {
                wrapper.className = 'flex justify-between items-center pt-2';
                wrapper.innerHTML = `
                    <label class="text-xs text-gray-300 font-medium">${label.innerHTML}</label>
                    <div class="relative inline-block w-8 h-4 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 border-[#333] appearance-none cursor-pointer transition-all duration-300 z-10" ${value ? 'checked' : ''}/>
                        <label class="toggle-label block overflow-hidden h-4 rounded-full bg-[#333] cursor-pointer transition-colors duration-300"></label>
                    </div>
                `;
                const cb = wrapper.querySelector('input');
                cb.addEventListener('change', (e) => { this.updateActiveLayer(control.id, e.target.checked); });
            }
            paramsDiv.appendChild(wrapper);
        });
        panel.appendChild(paramsDiv);
    },

    renderStack(ctx, width, height) {
        ctx.clearRect(0, 0, width, height);
        this.tempCanvas.width = width; this.tempCanvas.height = height;
        const renderList = [...this.layers].reverse();

        renderList.forEach(layer => {
            if(!layer.visible) return;
            if (layer.type === 'glitch' && layer.params.desplazamiento > 0) {
                Engine.applyGlitchBlockShift(ctx, width, height, layer.params.desplazamiento);
                if (layer.params.aberracion > 0) {
                    const offset = layer.params.aberracion * 10;
                    ctx.globalCompositeOperation = 'screen'; ctx.fillStyle = 'rgba(255,0,0,0.5)'; ctx.fillRect(offset, 0, width, height);
                    ctx.globalCompositeOperation = 'source-over';
                }
            }
            this.tempCtx.clearRect(0, 0, width, height);
            LayerDefinitions[layer.type].render(this.tempCtx, width, height, layer.params);

            ctx.globalAlpha = layer.opacity; ctx.globalCompositeOperation = layer.blendMode; ctx.drawImage(this.tempCanvas, 0, 0);
        });
        ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
    },

    renderPreview() {
        this.previewCanvas.width = this.previewRes; this.previewCanvas.height = this.previewRes;
        this.renderStack(this.previewCtx, this.previewRes, this.previewRes);
    },

    exportTexture() {
        const res = parseInt(document.getElementById('exportRes').value);
        const format = document.getElementById('exportFormat').value;
        const overlay = document.getElementById('exportOverlay');
        
        overlay.classList.remove('hidden'); overlay.classList.add('flex');

        setTimeout(() => {
            const renderCanvas = document.getElementById('renderCanvas');
            renderCanvas.width = res; renderCanvas.height = res;
            const rCtx = renderCanvas.getContext('2d', { willReadFrequently: true });

            if(format === 'image/jpeg') { rCtx.fillStyle = '#ffffff'; rCtx.fillRect(0, 0, res, res); }

            this.renderStack(rCtx, res, res);
            const ext = format.split('/')[1];
            const dataUrl = renderCanvas.toDataURL(format, 0.95);
            const link = document.createElement('a'); link.download = `TextureGen_${res}.${ext}`; link.href = dataUrl; link.click();

            overlay.classList.add('hidden'); overlay.classList.remove('flex');
        }, 100);
    }
};

window.onload = () => app.init();
</script>
</body>
